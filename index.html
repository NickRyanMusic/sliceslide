<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Hello Bletchley</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #32394A; overflow: hidden; font-family: 'IBM Plex Mono', monospace;
    touch-action: none; -webkit-user-select: none; user-select: none;
    position: fixed; width: 100%; height: 100%; }
  #splash { position: fixed; inset: 0; background: #32394A;
    display: flex; align-items: center; justify-content: center; z-index: 300; }
  #splash video { width: 100%; height: 100%; object-fit: contain; }
  #splash.done { display: none; }
  #start-screen { position: fixed; inset: 0; background: #32394A;
    display: none; flex-direction: column; align-items: center; justify-content: center;
    z-index: 200; padding: 30px; text-align: center; }
  #start-screen.show { display: flex; }
  #start-screen img { width: 70%; max-width: 320px; margin-bottom: 24px; }
  #start-screen p { color: #D4BFAB; font-size: 13px; line-height: 1.7; max-width: 300px; margin-bottom: 28px; }
  #start-btn { background: none; border: 2px solid #E44A38; color: #E44A38;
    font-family: 'IBM Plex Mono', monospace; font-size: 18px;
    padding: 14px 40px; border-radius: 6px; cursor: pointer; letter-spacing: 1px; }
  #start-btn:active { background: rgba(228,74,56,0.15); }
  #three-canvas { position: fixed; inset: 0; z-index: 5; pointer-events: none; }
</style>
</head>
<body>
<div id="splash">
  <video id="splash-vid" muted playsinline>
    <source src="splash.webm" type="video/webm">
    <source src="splash.mp4" type="video/mp4">
  </video>
</div>
<div id="start-screen">
  <img src="logo.png" alt="Hello Bletchley">
  <p>Enter your session code, then point your camera at the sculpture to see your layer revealed.</p>
  <button id="start-btn" ontouchend="go()" onclick="go()">START</button>
</div>
<canvas id="three-canvas"></canvas>
<script>
var splashVid=document.getElementById('splash-vid');
splashVid.play().catch(function(){});
splashVid.addEventListener('ended',showStart);
setTimeout(showStart,7000);
document.getElementById('splash').addEventListener('click',showStart);
document.getElementById('splash').addEventListener('touchend',showStart);
var splashDone=false;
function showStart(){if(splashDone)return;splashDone=true;document.getElementById('splash').classList.add('done');document.getElementById('start-screen').classList.add('show');}
</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
<script>
// ============================================================
// CONFIG
// ============================================================
var TARGET_ASPECT=2/3,TARGET_FILL=0.9,SCULPT_ASPECT=2/3,NUM_LAYERS=82;
var SCAN_FRAMES=320,LOCK_THRESHOLD=0.50,LOCK_HOLD=30,EDGE_SCALE=4,EDGE_THRESH=38;
var NAVY=[50,57,74],RED=[228,74,56],DRED=[185,74,60],BEIGE=[212,191,171],LGREY=[227,225,223];

// States: CODE → ALIGN → LOCATE → SLICE → VIEW
var S={CODE:0,ALIGN:1,LOCATE:2,SLICE:3,VIEW:4};
var state=S.CODE,stateStart=0;

var cap,VW=480,VH=640,fX,fY,fW,fH,sX,sY,sW,sH;
var camDx=0,camDy=0,camDw=1,camDh=1;
var edgeGfx,edgeMapW,edgeMapH,edgeMap;
var scores={top:0,bottom:0,left:0,right:0},smooth={top:0,bottom:0,left:0,right:0};
var conf=0,smoothConf=0,holdCount=0;
var digits=['','','','',''],dIdx=0,codeComplete=false,codeFrame=0,targetLayer=31;
var locateFound=false,locateFoundFrame=0,viewTimer=0,expandedIdx=-1;
var words=[],archives=[],particles=[],archImgs=[];
var WORDS=['memory','codebreaking','secrecy','courage','community','Turing','Enigma','patterns','together','perseverance','silence','brilliant','duty','home','belonging','sacrifice','hidden','transformation','hope','legacy','friendship','quiet','remarkable','ordinary','extraordinary','computing','nature','truth','resolve','connection'];
var ARCHS=['CPA_003_005.jpg','CPA_005_031.jpg','CPA_010_095.jpg','CPA_022_004.jpg','CPA_022_013.jpg'];
var ARCH_IDS=['7B3F1','A2C9D','3E8B4','D1F6A','9C4E2'];
var layers=[];

// Globals for Three.js communication
window.sliceActive = false;
window.sliceDone = false;
window.sliceTargetScreenX = 0;
window.sliceTargetScreenY = 0;
window.sliceSculptScreenW = 0;

function go(){document.getElementById('start-screen').style.display='none';new p5(sk);}

var sk=function(p){
  var numBtns=[];
  p.setup=function(){
    p.createCanvas(p.windowWidth,p.windowHeight);p.pixelDensity(1);p.textFont('IBM Plex Mono');
    cap=p.createCapture({video:{facingMode:{ideal:'environment'},width:{ideal:VW},height:{ideal:VH}},audio:false});cap.hide();
    edgeMapW=Math.floor(VW/EDGE_SCALE);edgeMapH=Math.floor(VH/EDGE_SCALE);
    edgeGfx=p.createGraphics(edgeMapW,edgeMapH);edgeGfx.pixelDensity(1);
    calcFrame(p);buildLayers(p);
    for(var i=0;i<ARCHS.length;i++){p.loadImage(ARCHS[i],function(img){archImgs.push(img);});}
    buildFloats(p);stateStart=p.frameCount;
  };
  function calcFrame(p){
    fW=p.width*TARGET_FILL;fH=fW/TARGET_ASPECT;
    if(fH>p.height*0.7){fH=p.height*0.7;fW=fH*TARGET_ASPECT;}
    fX=(p.width-fW)/2;fY=(p.height-fH)/2-p.height*0.03;
    if(fW/SCULPT_ASPECT<=fH){sW=fW*0.92;sH=sW/SCULPT_ASPECT;}else{sH=fH*0.92;sW=sH*SCULPT_ASPECT;}
    sX=fX+(fW-sW)/2;sY=fY+(fH-sH)/2;
  }
  function buildLayers(p){layers=[];var chars='123456789ABCDEF';for(var i=0;i<NUM_LAYERS;i++){var t=i/(NUM_LAYERS-1);var id='';for(var j=0;j<5;j++)id+=chars[Math.floor(p.random(chars.length))];layers.push({t:t,label:id});}}
  function buildFloats(p){words=[];archives=[];particles=[];
    for(var i=0;i<WORDS.length;i++){words.push({word:WORDS[i],x:p.random(-sW*1.2,sW*1.2),y:p.random(-sH*0.8,sH*0.8),vx:p.random(-0.2,0.2),vy:p.random(-0.12,0.12),size:p.random(11,20),alpha:0,target:p.random(140,240),phase:p.random(p.TWO_PI),bold:p.random()>0.65});}
    for(var i=0;i<ARCHS.length;i++){var ang=(i/ARCHS.length)*p.TWO_PI+p.random(-0.15,0.15);var d=p.random(p.width*0.35,p.width*0.5);archives.push({label:ARCH_IDS[i],imgIdx:i,x:0,y:0,maxDim:p.random(90,120),angle:p.random(-0.03,0.03),oSpd:p.random(0.0003,0.0006)*(p.random()>0.5?1:-1),oAng:ang,oDist:d,alpha:0,phase:p.random(p.TWO_PI)});}
    var chars='123456789ABCDEF';for(var i=0;i<60;i++){particles.push({x:p.random(p.width),y:p.random(p.height),vx:p.random(-0.2,0.2),vy:p.random(-0.4,-0.05),sz:p.random(7,12),a:p.random(25,70),life:p.random(200,500),max:500,ch:chars[Math.floor(Math.random()*chars.length)]});}
  }

  // ---- DRAW ----
  p.draw=function(){p.background(NAVY[0],NAVY[1],NAVY[2]);var st=p.frameCount-stateStart;
    if(cap&&cap.loadedmetadata)drawCam(p);
    p.noStroke();p.fill(NAVY[0],NAVY[1],NAVY[2],state===S.CODE?160:state===S.ALIGN?20:50);p.rect(0,0,p.width,p.height);
    if(cap&&cap.loadedmetadata&&state===S.ALIGN)computeEdges(p);drawParts(p);
    switch(state){
      case S.CODE:doCode(p,st);break;
      case S.ALIGN:doAlign(p,st);break;
      case S.LOCATE:doLocate(p,st);break;
      case S.SLICE:doSlice(p,st);break;
      case S.VIEW:doView(p,st);break;
    }
    for(var y=0;y<p.height;y+=4){p.stroke(0,0,0,6);p.strokeWeight(1);p.line(0,y,p.width,y);}
  };

  function drawCam(p){var cw=cap.width||VW,ch=cap.height||VH,sa=p.width/p.height,ca=cw/ch;
    if(ca>sa){camDh=p.height;camDw=camDh*ca;camDx=(p.width-camDw)/2;camDy=0;}else{camDw=p.width;camDh=camDw/ca;camDx=0;camDy=(p.height-camDh)/2;}p.image(cap,camDx,camDy,camDw,camDh);}
  function drawParts(p){var chars='123456789ABCDEF';p.textAlign(p.CENTER,p.CENTER);p.textStyle(p.NORMAL);
    for(var i=0;i<particles.length;i++){var pt=particles[i];pt.x+=pt.vx;pt.y+=pt.vy;pt.life--;
      if(pt.life<=0||pt.y<-10){pt.x=p.random(p.width);pt.y=p.height+10;pt.life=pt.max;pt.ch=chars[Math.floor(Math.random()*chars.length)];}
      var a=pt.a*Math.min(pt.life/50,1);p.noStroke();p.fill(RED[0],RED[1],RED[2],a);p.textSize(pt.sz);p.text(pt.ch,pt.x,pt.y);}}
  function computeEdges(p){edgeGfx.image(cap,0,0,edgeMapW,edgeMapH);edgeGfx.loadPixels();var px=edgeGfx.pixels,w=edgeMapW,h=edgeMapH;
    if(!edgeMap||edgeMap.length!==w*h*2)edgeMap=new Float32Array(w*h*2);
    for(var x=1;x<w-1;x++)for(var y=1;y<h-1;y++){var tl=lum(px,(y-1)*w+(x-1)),tc=lum(px,(y-1)*w+x),tr=lum(px,(y-1)*w+(x+1)),ml=lum(px,y*w+(x-1)),mr=lum(px,y*w+(x+1)),bl=lum(px,(y+1)*w+(x-1)),bc=lum(px,(y+1)*w+x),br=lum(px,(y+1)*w+(x+1));
      var gx=-tl-2*ml-bl+tr+2*mr+br,gy=-tl-2*tc-tr+bl+2*bc+br,idx=(y*w+x)*2;edgeMap[idx]=Math.sqrt(gx*gx+gy*gy);edgeMap[idx+1]=Math.atan2(gy,gx);}}
  function lum(px,i){var j=i*4;return 0.299*px[j]+0.587*px[j+1]+0.114*px[j+2];}
  function sampleSide(x1,y1,x2,y2,orient,n,sR){var w=edgeMapW,h=edgeMapH,mc=0;
    for(var i=0;i<n;i++){var t=(i+0.5)/n;var sx=p.lerp(x1,x2,t),sy=p.lerp(y1,y2,t);
      var px0=Math.round((sx-camDx)/camDw*w),py0=Math.round((sy-camDy)/camDh*h);
      if(px0<2||px0>=w-2||py0<2||py0>=h-2)continue;var bestM=0,bestD=0;
      for(var dx=-sR;dx<=sR;dx++)for(var dy=-sR;dy<=sR;dy++){var ex=px0+dx,ey=py0+dy;if(ex<1||ex>=w-1||ey<1||ey>=h-1)continue;var idx=(ey*w+ex)*2;if(edgeMap[idx]>bestM){bestM=edgeMap[idx];bestD=edgeMap[idx+1];}}
      if(bestM>EDGE_THRESH){if(orient==='h'&&Math.abs(Math.sin(bestD))>0.5)mc++;if(orient==='v'&&Math.abs(Math.cos(bestD))>0.5)mc++;}}return mc/n;}

  // ---- CODE ----
  function doCode(p,st){var cx=p.width/2,cy=p.height/2-30,ha=Math.min(st/20,1);
    p.fill(RED[0],RED[1],RED[2],ha*255);p.textAlign(p.CENTER,p.CENTER);p.textSize(11);p.noStroke();p.text('H E L L O   B L E T C H L E Y',cx,p.height*0.08);
    p.fill(LGREY[0],LGREY[1],LGREY[2],ha*240);p.textSize(15);p.text('ENTER YOUR SESSION CODE',cx,cy-80);
    p.fill(BEIGE[0],BEIGE[1],BEIGE[2],ha*160);p.textSize(10);p.text('The 5-character code from your A1 interview',cx,cy-58);
    var bxW=42,bxG=10,tot=5*bxW+4*bxG,sx=cx-tot/2;
    for(var i=0;i<5;i++){var bx=sx+i*(bxW+bxG),by=cy-22,act=(i===dIdx&&!codeComplete),fil=digits[i]!=='';
      if(act){p.noFill();p.stroke(RED[0],RED[1],RED[2],(Math.sin(p.frameCount*0.08)*0.3+0.7)*140);p.strokeWeight(6);p.rect(bx-1,by-1,bxW+2,46,4);}
      p.fill(NAVY[0],NAVY[1],NAVY[2],240);p.noStroke();p.rect(bx,by,bxW,44,3);p.noFill();
      if(fil){p.stroke(RED[0],RED[1],RED[2],240);p.strokeWeight(1.5);}else if(act){p.stroke(LGREY[0],LGREY[1],LGREY[2],200);p.strokeWeight(1.5);}else{p.stroke(BEIGE[0],BEIGE[1],BEIGE[2],50);p.strokeWeight(1);}
      p.rect(bx,by,bxW,44,3);if(fil){p.noStroke();p.fill(RED[0],RED[1],RED[2],255);p.textSize(24);p.text(digits[i],bx+bxW/2,by+22);}
      if(act&&Math.sin(p.frameCount*0.08)>0){p.stroke(LGREY[0],LGREY[1],LGREY[2],220);p.strokeWeight(1.5);p.line(bx+bxW/2,by+8,bx+bxW/2,by+36);}}
    if(!codeComplete)drawNumpad(p,cx,cy+55);
    if(codeComplete){var ct=st-codeFrame;
      if(ct<12){p.noStroke();p.fill(RED[0],RED[1],RED[2],(1-ct/12)*60);p.rect(0,0,p.width,p.height);}
      if(ct>10){var a=Math.min((ct-10)/15,1);p.noStroke();p.fill(NAVY[0],NAVY[1],NAVY[2],a*200);p.rect(cx-120,cy+40,240,55,5);
        p.fill(RED[0],RED[1],RED[2],a*255);p.textSize(14);p.textAlign(p.CENTER,p.CENTER);p.text('CODE ACCEPTED',cx,cy+55);
        p.fill(BEIGE[0],BEIGE[1],BEIGE[2],a*220);p.textSize(11);p.text('Session '+layers[targetLayer].label,cx,cy+75);}
      if(ct>70)setState(S.ALIGN);}}
  function drawNumpad(p,cx,cy){var keys=['1','2','3','4','5','6','7','8','9','A','B','C','D','E','F'];
    var cols=5,bW=46,bH=40,gap=6,gridW=cols*bW+(cols-1)*gap,sx=cx-gridW/2;numBtns=[];
    for(var i=0;i<keys.length;i++){var col=i%cols,row=Math.floor(i/cols),bx=sx+col*(bW+gap),by=cy+row*(bH+gap),k=keys[i],isL=k>='A';
      numBtns.push({x:bx,y:by,w:bW,h:bH,d:k});p.fill(NAVY[0],NAVY[1],NAVY[2],240);p.noStroke();p.rect(bx,by,bW,bH,5);
      p.noFill();p.stroke(isL?DRED[0]:BEIGE[0],isL?DRED[1]:BEIGE[1],isL?DRED[2]:BEIGE[2],60);p.strokeWeight(1);p.rect(bx,by,bW,bH,5);
      p.noStroke();p.fill(isL?RED[0]:LGREY[0],isL?RED[1]:LGREY[1],isL?RED[2]:LGREY[2],220);p.textSize(17);p.textAlign(p.CENTER,p.CENTER);p.text(k,bx+bW/2,by+bH/2);}
    var delY=cy+3*(bH+gap),delX=cx-bW/2;numBtns.push({x:delX,y:delY,w:bW,h:bH,d:'DEL'});
    p.fill(NAVY[0],NAVY[1],NAVY[2],240);p.noStroke();p.rect(delX,delY,bW,bH,5);
    p.noFill();p.stroke(DRED[0],DRED[1],DRED[2],50);p.strokeWeight(1);p.rect(delX,delY,bW,bH,5);
    p.noStroke();p.fill(DRED[0],DRED[1],DRED[2],200);p.textSize(10);p.text('DEL',delX+bW/2,delY+bH/2);}

  // ---- ALIGN ----
  function doAlign(p,st){if(cap&&cap.loadedmetadata){var sR=8,ns=24;
      scores.top=sampleSide(fX,fY,fX+fW,fY,'h',ns,sR);scores.bottom=sampleSide(fX,fY+fH,fX+fW,fY+fH,'h',ns,sR);
      scores.left=sampleSide(fX,fY,fX,fY+fH,'v',ns,sR);scores.right=sampleSide(fX+fW,fY,fX+fW,fY+fH,'v',ns,sR);
      var sm=0.15;smooth.top=p.lerp(smooth.top,scores.top,sm);smooth.bottom=p.lerp(smooth.bottom,scores.bottom,sm);
      smooth.left=p.lerp(smooth.left,scores.left,sm);smooth.right=p.lerp(smooth.right,scores.right,sm);
      conf=Math.min(smooth.top,smooth.bottom,smooth.left,smooth.right);smoothConf=p.lerp(smoothConf,conf,0.12);
      if(smooth.top>=LOCK_THRESHOLD&&smooth.bottom>=LOCK_THRESHOLD&&smooth.left>=LOCK_THRESHOLD&&smooth.right>=LOCK_THRESHOLD)holdCount++;
      else holdCount=Math.max(0,holdCount-2);
      if(holdCount>=LOCK_HOLD){setState(S.LOCATE);if(navigator.vibrate)navigator.vibrate(100);}}
    var c=smoothConf,r,g,b;if(c<0.3){r=RED[0];g=RED[1];b=RED[2];}else if(c<LOCK_THRESHOLD){r=255;g=200;b=60;}else{r=60;g=220;b=140;}
    var cl=Math.min(fW,fH)*0.1;p.noFill();p.stroke(r,g,b,35);p.strokeWeight(1);p.rect(fX,fY,fW,fH);
    p.stroke(r,g,b,210);p.strokeWeight(2.5);p.line(fX,fY,fX+cl,fY);p.line(fX,fY,fX,fY+cl);p.line(fX+fW-cl,fY,fX+fW,fY);p.line(fX+fW,fY,fX+fW,fY+cl);
    p.line(fX,fY+fH-cl,fX,fY+fH);p.line(fX,fY+fH,fX+cl,fY+fH);p.line(fX+fW,fY+fH-cl,fX+fW,fY+fH);p.line(fX+fW-cl,fY+fH,fX+fW,fY+fH);
    var sides=[{s:smooth.top,x:fX+fW/2,y:fY-12},{s:smooth.bottom,x:fX+fW/2,y:fY+fH+16},{s:smooth.left,x:fX-22,y:fY+fH/2},{s:smooth.right,x:fX+fW+22,y:fY+fH/2}];
    p.textAlign(p.CENTER,p.CENTER);p.textSize(9);p.noStroke();
    for(var i=0;i<sides.length;i++){var s=sides[i],ok=s.s>=LOCK_THRESHOLD;p.fill(ok?60:s.s>0.2?255:RED[0],ok?220:s.s>0.2?200:RED[1],ok?140:s.s>0.2?60:RED[2],180);p.text(Math.round(s.s*100)+'%',s.x,s.y);}
    var bW2=fW*0.6,bX2=(p.width-bW2)/2,bY2=fY+fH+34;p.fill(255,255,255,15);p.rect(bX2,bY2,bW2,4,2);p.fill(r,g,b,200);p.rect(bX2,bY2,bW2*smoothConf,4,2);
    if(holdCount>0){var hp=holdCount/LOCK_HOLD;for(var i=0;i<10;i++){p.fill(60,220,140,i/10<hp?220:30);p.circle(bX2+(i/9)*bW2,bY2+14,4);}}
    p.fill(RED[0],RED[1],RED[2],220);p.textSize(11);p.textAlign(p.CENTER,p.CENTER);p.text('H E L L O   B L E T C H L E Y',p.width/2,24);
    p.fill(BEIGE[0],BEIGE[1],BEIGE[2],180);p.textSize(13);p.text('Session '+layers[targetLayer].label,p.width/2,44);
    p.fill(LGREY[0],LGREY[1],LGREY[2],150);p.textSize(12);p.text('Line up the frame with the sculpture',p.width/2,fY-36);
    p.fill(BEIGE[0],BEIGE[1],BEIGE[2],100);p.textSize(9);p.text('Hold steady when all sides turn green',p.width/2,fY-22);}

  // ---- SCULPTURE ----
  function drawSculptRect(p,alpha,hlLayer,emptySlot){
    p.noFill();p.stroke(RED[0],RED[1],RED[2],alpha*180);p.strokeWeight(1.5);p.rect(sX,sY,sW,sH);
    p.noStroke();p.fill(RED[0],RED[1],RED[2],alpha*10);p.rect(sX,sY,sW,sH);
    var layerH=sH/NUM_LAYERS;
    for(var i=0;i<NUM_LAYERS;i++){var ly=sY+i*layerH;
      if(i===emptySlot){
        p.drawingContext.setLineDash([3,4]);p.strokeStyle='rgba(228,74,56,0.25)';p.stroke(RED[0],RED[1],RED[2],50);p.strokeWeight(0.5);p.noFill();
        p.rect(sX+2,ly,sW-4,layerH);p.drawingContext.setLineDash([]);
      } else if(i===hlLayer){var pulse=0.6+0.4*Math.sin(p.frameCount*0.06);
        p.noStroke();for(var g=0;g<10;g++){p.fill(RED[0],RED[1],RED[2],pulse*18*(1-g/10));p.rect(sX-g*2,ly-layerH*0.5-g,sW+g*4,layerH+g*2);}
        p.fill(RED[0],RED[1],RED[2],200+55*pulse);p.rect(sX,ly,sW,layerH);
        p.stroke(LGREY[0],LGREY[1],LGREY[2],200+55*pulse);p.strokeWeight(1.5);p.line(sX,ly,sX+sW,ly);p.line(sX,ly+layerH,sX+sW,ly+layerH);
      }else if(hlLayer>=0){var dist=Math.abs(i-hlLayer),near=Math.max(0,1-dist/10);
        if(near>0.05){p.stroke(RED[0],RED[1],RED[2],alpha*(30+near*140));p.strokeWeight(0.4+near*0.6);p.line(sX,ly+layerH/2,sX+sW,ly+layerH/2);}
      }else{if(i%2===0){p.stroke(RED[0],RED[1],RED[2],alpha*35);p.strokeWeight(0.4);p.line(sX,ly+layerH/2,sX+sW,ly+layerH/2);}}
    }
  }

  // ---- LOCATE ----
  function doLocate(p,st){
    drawSculptRect(p,0.4,-1,-1);
    var prog=Math.min(st/SCAN_FRAMES,1),scanIdx=Math.floor(prog*(NUM_LAYERS-1)),layerH=sH/NUM_LAYERS;
    if(!locateFound){var beamY=sY+scanIdx*layerH;

<!-- THREE.JS 3D SLICE (module script, runs independently) -->
<script type="module">
import * as THREE from 'https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.module.js';

const canvas = document.getElementById('three-canvas');
const renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

const scene = new THREE.Scene();
const camZ = 5, fov = 55;
const camera = new THREE.PerspectiveCamera(fov, window.innerWidth/window.innerHeight, 0.1, 100);
camera.position.set(0, 0, camZ); camera.lookAt(0, 0, 0);

scene.add(new THREE.AmbientLight(0xaabbcc, 0.6));
var d1 = new THREE.DirectionalLight(0xffeedd, 0.9); d1.position.set(3,4,5); scene.add(d1);
var d2 = new THREE.DirectionalLight(0xE44A38, 0.25); d2.position.set(-2,-1,3); scene.add(d2);
var d3 = new THREE.DirectionalLight(0x8899bb, 0.3); d3.position.set(0,-3,2); scene.add(d3);

const sliceMat = new THREE.MeshStandardMaterial({ color:0xE44A38, metalness:0.55, roughness:0.3, emissive:0xE44A38, emissiveIntensity:0.08 });

// Parse OBJ
async function loadOBJ(url) {
  const text = await (await fetch(url)).text();
  const verts=[], faces=[];
  for (const line of text.split('\n')) {
    const p = line.trim().split(/\s+/);
    if(p[0]==='v') verts.push(+p[1],+p[2],+p[3]);
    else if(p[0]==='f'){const idxs=p.slice(1).map(x=>parseInt(x.split('/')[0])-1);for(let i=1;i<idxs.length-1;i++)faces.push(idxs[0],idxs[i],idxs[i+1]);}
  }

  geo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(verts),3));
  geo.setIndex(faces); geo.computeVertexNormals(); geo.computeBoundingBox();
  const bb=geo.boundingBox;
  geo.translate(-(bb.max.x+bb.min.x)/2, -(bb.max.y+bb.min.y)/2, -(bb.max.z+bb.min.z)/2);
  const maxD=Math.max(bb.max.x-bb.min.x, bb.max.y-bb.min.y, bb.max.z-bb.min.z);
  geo.scale(1/maxD, 1/maxD, 1/maxD);
  return geo;
}

function s2w(sx, sy, z) {
  z = z || 0;
  const dist = camZ - z;
  const vH = 2 * dist * Math.tan(THREE.MathUtils.degToRad(fov/2));
  const vW = vH * (window.innerWidth / window.innerHeight);
  return new THREE.Vector3((sx/window.innerWidth - 0.5)*vW, -(sy/window.innerHeight - 0.5)*vH, z);
}
function sculptWorldW() {
  const vW = 2 * camZ * Math.tan(THREE.MathUtils.degToRad(fov/2)) * (window.innerWidth/window.innerHeight);
  return (window.sliceSculptScreenW / window.innerWidth) * vW;
}

let sliceMesh = null, sliceGeo = null;
loadOBJ('slice.obj').then(geo => { sliceGeo = geo; });

// Animation
const PH = {IDLE:0, EMERGE:1, FLIP:2, SHOW:3, UNFLIP:4, RETURN:5};
let phase = PH.IDLE, phaseTime = 0, savedRotY = 0;
const clock = new THREE.Clock();
const espd=1.0, fspd=0.8, sdur=5, edist=2.5, fang=70*Math.PI/180;

  requestAnimationFrame(animate);
  const dt = clock.getDelta();

    // Create or reuse mesh

    phase = PH.EMERGE;
    phaseTime = 0;

  }

  // Animate

      sliceMesh.position.z = homePos.z + e * edist;
      sliceMesh.position.y = THREE.MathUtils.lerp(homePos.y, 0, e);
      if (t>=1) { phase=PH.FLIP; phaseTime=0; }

      const t=Math.min(phaseTime*fspd,1), e=ease(t);
      sliceMesh.rotation.x = Math.PI/2 - e * fang;
      if (t>=1) { phase=PH.SHOW; phaseTime=0; }

    else if (phase === PH.SHOW) {
      sliceMesh.rotation.y += dt * 0.8;
      sliceMesh.position.y = 0 + Math.sin(phaseTime*1.2)*0.06;
      if (phaseTime>=sdur) { phase=PH.UNFLIP; phaseTime=0; savedRotY=sliceMesh.rotation.y; }
    }
    else if (phase === PH.UNFLIP) {
      const t=Math.min(phaseTime*fspd,1), e=ease(t);
      sliceMesh.rotation.x = THREE.MathUtils.lerp(Math.PI/2-fang, Math.PI/2, e);
      const tgtY = Math.round(savedRotY/(Math.PI*2))*Math.PI*2;
      sliceMesh.rotation.y = THREE.MathUtils.lerp(savedRotY, tgtY, e);
      if (t>=1) { phase=PH.RETURN; phaseTime=0; sliceMesh.rotation.set(Math.PI/2,0,0); }

      const t=Math.min(phaseTime*espd,1), e=ease(t);
      sliceMesh.position.z = THREE.MathUtils.lerp(homePos.z+edist, homePos.z, e);
      sliceMesh.position.y = THREE.MathUtils.lerp(0, homePos.y, e);
      if (t>=1) {
        phase=PH.IDLE; phaseTime=0;
        sliceMesh.visible=false;
        sliceMesh.rotation.set(Math.PI/2,0,0);
        window.sliceDone = true;
        window.sliceActive = false;
      }
    }
  }

  renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', () => {
  renderer.setSize(window.innerWidth, window.innerHeight);
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
});
</script>
